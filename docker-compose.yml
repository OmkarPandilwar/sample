version: '3.8'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: src/CustomerManagement.API/Dockerfile
    container_name: customer_api
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=CustomerManagementDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__SecretKey=CustomerMgmt_SuperSecret_Key_2024_MustBe32CharsLong!
      - JwtSettings__Issuer=CustomerManagementAPI
      - JwtSettings__Audience=CustomerManagementClient
      - JwtSettings__ExpiryMinutes=60
    depends_on:
      - sqlserver
      - redis

  frontend:
    build:
      context: ./frontend/customer-management-ui
      dockerfile: Dockerfile
    container_name: customer_frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqlserver_data: